name: Test attach-path and attach-text inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create attachment file
        run: |
          echo "Attachment content for testing." > /tmp/test-attachment.txt
      - id: action
        uses: .
        with:
          message: "See attached file"
          attach-path: /tmp/test-attachment.txt
          attach-text: "Download the full report: %ARTIFACT_URL%"
          repo-token: ${{ github.token }}
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "comment-created: ${{ steps.action.outputs.comment-created }}"
          echo "artifact-url: ${{ steps.action.outputs.artifact-url }}"
          echo "PASS: action completed with attach-path and attach-text inputs"
