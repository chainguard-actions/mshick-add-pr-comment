name: Test commit-sha input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get current commit SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
      - id: action
        uses: .
        with:
          message: "Commit comment test"
          comment-target: commit
          commit-sha: ${{ steps.sha.outputs.sha }}
          repo-token: ${{ github.token }}
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "comment-created: ${{ steps.action.outputs.comment-created }}"
          echo "comment-id: ${{ steps.action.outputs.comment-id }}"
          echo "PASS: action completed with commit-sha input"
