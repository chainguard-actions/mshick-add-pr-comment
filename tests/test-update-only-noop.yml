name: Test update-only no-op
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          message: "Test comment message"
          update-only: "true"
          repo-token: "fake-token-for-testing"
          message-id: "test-update-only"
        continue-on-error: true

      - name: Assert action ran (update-only with no existing comment is a no-op)
        env:
          COMMENT_CREATED: ${{ steps.action.outputs.comment-created }}
          COMMENT_UPDATED: ${{ steps.action.outputs.comment-updated }}
        run: |
          echo "comment-created: $COMMENT_CREATED"
          echo "comment-updated: $COMMENT_UPDATED"
          # With update-only=true and no existing comment, neither should be true
          if [ "$COMMENT_CREATED" = "true" ]; then
            echo "FAIL: comment-created should not be true in update-only mode with no existing comment"
            exit 1
          fi
          if [ "$COMMENT_UPDATED" = "true" ]; then
            echo "FAIL: comment-updated should not be true when no comment exists"
            exit 1
          fi
          echo "PASS: action ran in update-only mode without creating a comment"
