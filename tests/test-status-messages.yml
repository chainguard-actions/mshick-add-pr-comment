name: Test status message inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          message-success: "The run succeeded!"
          message-failure: "The run failed!"
          message-cancelled: "The run was cancelled!"
          message-skipped: "The run was skipped!"
          status: success
          repo-token: ${{ github.token }}
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "comment-created: ${{ steps.action.outputs.comment-created }}"
          echo "comment-updated: ${{ steps.action.outputs.comment-updated }}"
          echo "PASS: action completed with status message inputs"
